[llm]
# Provider to use: "ollama" (local) or "openai"
provider = "ollama"

[ollama]
# Model to use for inference. Change this to swap models without touching code.
# Popular options:
#   llama3.1:8b   — fast, good quality (~4.7 GB)
#   llama3.2:3b   — very fast, lighter quality (~2 GB)
#   llama3:70b    — best quality, very slow on laptops (~39 GB)
#   mistral:7b    — fast alternative to llama (~4.1 GB)
model = "llama3.1:8b"

[openai]
# Model to use when provider = "openai".
# API key is read from the OPENAI_API_KEY environment variable.
# Popular options:
#   gpt-4o-mini   — fast, low cost
#   gpt-4o        — best quality
model = "gpt-4o-mini"
